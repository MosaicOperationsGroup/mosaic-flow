name: deploy-pages

# Publishes this static site to GitHub Pages via the standard Actions
# pipeline. Replaces the legacy branch-based Pages builder, which got
# stuck (status: building, duration: 0) on the commit that added the
# logo mark and 3D hero model.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Inline feature content (removes standalone content.json)
        # content.json is the curated source of truth kept in git, but
        # shipping it as its own file means it's directly fetchable and
        # bypasses the staticrypt gate below entirely. This embeds each
        # feature's content into its own HTML page and deletes the
        # standalone file from the build output before anything is
        # encrypted or uploaded.
        run: node scripts/inline-feature-data.mjs
      - name: Encrypt feature detail pages (staticrypt)
        # Gates only features/**/*.html — the main explainer (index.html) and
        # the governance table stay open. Password is a repo secret, never
        # committed in plaintext (this workflow file is public).
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          shopt -s globstar
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::warning::STATICRYPT_PASSWORD secret is not set — feature pages will deploy UNENCRYPTED."
          else
            # One invocation per file, each -d targeting that file's own
            # directory. staticrypt names output by basename in the given
            # -d directory — passing the whole glob in one call makes every
            # "index.html" collide and overwrite each other at a single
            # shared path instead of each file's own location.
            for f in features/**/*.html; do
              dir=$(dirname "$f")
              npx --yes staticrypt "$f" -p "$STATICRYPT_PASSWORD" --short -d "$dir"
            done
            echo "Post-encryption check (should show a password prompt, not plain content):"
            head -c 200 features/task-management/index.html
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
